services:
  omniroute:
    image: ghcr.io/diegosouzapw/omniroute:latest
    container_name: omniroute
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      DATA_DIR: /app/data
      PORT: ${PORT:-20128}
      DASHBOARD_PORT: ${DASHBOARD_PORT:-20128}
      API_PORT: ${API_PORT:-20129}
      API_HOST: 0.0.0.0
    ports:
      - "${DASHBOARD_PORT:-20128}:${DASHBOARD_PORT:-20128}"
      - "${API_PORT:-20129}:${API_PORT:-20129}"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "healthcheck.mjs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
